# Included inside the existing 10.1.131.51 nginx server block. Keep this route
# exact so the registration application already served at / is unaffected.
location = /investigation-summary.html {
    proxy_pass http://10.1.131.51:3000/investigation-summary.html;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
